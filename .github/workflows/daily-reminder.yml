name: Daily reminder

# Sends Natasha's daily Czech-practice push notification.
#
# GitHub Actions cron is in UTC only. This is set to 23:00 UTC ≈ 19:00 US Eastern (EDT).
# ADJUST the cron below to hit ~19:00 in HER timezone:
#   • US Eastern (EDT/UTC-4): "0 23 * * *"      • US Eastern (EST/UTC-5): "0 0 * * *"
#   • US Central  (CDT/UTC-5): "0 0 * * *"       • US Pacific (PDT/UTC-7): "0 2 * * *"
#   • Central Europe (CEST/UTC+2): "0 17 * * *"  • UK (BST/UTC+1): "0 18 * * *"
# (Note: cron doesn't auto-adjust for daylight saving; nudge it twice a year if needed.)
on:
  schedule:
    - cron: "0 23 * * *"
  workflow_dispatch: {}   # lets you run it manually to test (Actions tab ▸ Run workflow)

jobs:
  push:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - run: npm init -y && npm install web-push@3
      - run: node send-reminder.js
        env:
          VAPID_PUBLIC_KEY: ${{ secrets.VAPID_PUBLIC_KEY }}
          VAPID_PRIVATE_KEY: ${{ secrets.VAPID_PRIVATE_KEY }}
          VAPID_SUBJECT: ${{ secrets.VAPID_SUBJECT }}
          PUSH_SUBSCRIPTIONS: ${{ secrets.PUSH_SUBSCRIPTIONS }}
